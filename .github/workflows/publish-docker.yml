name: Publish Docker image

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      switchboard_url:
        description: 'NEXT_PUBLIC_SWITCHBOARD_URL baked into the build'
        required: false
        default: 'https://switchboard.defiunited.w3b.li/graphql'
      base_url:
        description: 'NEXT_PUBLIC_BASE_URL baked into the build'
        required: false
        default: 'https://defiunited.w3b.li'

env:
  DOCKER_REGISTRY: cr.vetra.io
  IMAGE_NAME: defi-united/web

jobs:
  build:
    name: Build & push to cr.vetra.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to cr.vetra.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}
          # workflow_dispatch builds (custom URLs for a specific environment
          # like staging) get a `staging-sha-*` prefix so they don't collide
          # with the auto-build on push that bakes the prod defaults.
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=sha,prefix=sha-,format=short,enable=${{ github.event_name == 'push' || github.event_name == 'workflow_call' }}
            type=sha,prefix=staging-sha-,format=short,enable=${{ github.event_name == 'workflow_dispatch' }}
            type=ref,event=branch,enable=${{ github.event_name == 'push' }}
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Resolve build args
        id: buildargs
        env:
          INPUT_SWITCHBOARD_URL: ${{ inputs.switchboard_url }}
          INPUT_BASE_URL: ${{ inputs.base_url }}
        run: |
          SWITCHBOARD_URL="${INPUT_SWITCHBOARD_URL:-https://switchboard.defiunited.w3b.li/graphql}"
          BASE_URL="${INPUT_BASE_URL:-https://defiunited.w3b.li}"
          {
            echo "switchboard_url=${SWITCHBOARD_URL}"
            echo "base_url=${BASE_URL}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_SWITCHBOARD_URL=${{ steps.buildargs.outputs.switchboard_url }}
            NEXT_PUBLIC_DEFAULT_CAMPAIGN_SLUG=rseth-2026-04
            NEXT_PUBLIC_BASE_URL=${{ steps.buildargs.outputs.base_url }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          {
            echo "## Published Docker image"
            echo
            echo "Tags pushed to \`${DOCKER_REGISTRY}/${IMAGE_NAME}\`:"
            echo
            echo '```'
            printf '%s\n' "$IMAGE_TAGS"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
