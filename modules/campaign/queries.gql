query GetCampaign($slug: String!) {
  DefiUnited_campaign(slug: $slug) {
    slug
    name
    summary
    status
    incidentDate
    targetAmount
    totalPledged
    totalReceived
    percentReceived
    pledgeCount
    dependenciesBlocking
    dependenciesResolved
    riskDisclaimer
    lastUpdateAt
    affectedAsset {
      symbol
      address
      chainId
    }
    contributionAddresses {
      chainId
      address
      label
    }
    contributorsPublic {
      contributorDisplayName
      contributorTrustLevel
      contributorWebsiteUrl
      contributorTwitter
      pledgedAmount
      receivedAmount
      assetSymbol
      status
      governanceProposalUrl
      governancePlatform
      publicNotes
    }
    dependenciesPublic {
      title
      description
      kind
      status
      externalRefUrl
      externalRefProposalId
      expectedResolution
    }
    recentUpdates {
      id
      publishedAt
      title
      body
      metricsTotalPledged
      metricsTotalReceived
      externalAnnouncements {
        platform
        url
      }
    }
    recentReceipts(limit: 25) {
      id
      txHash
      blockNumber
      blockTimestamp
      fromAddress
      toAddress
      assetSymbol
      assetContractAddress
      amount
      ethEquivalentAmount
      ethPriceUsdAtReceipt
      reconciliationStatus
      matchedPledgeId
    }
    onchainLiveBalance {
      totalEthEquivalent
      ethPriceUsd
      fetchedAt
      perAsset {
        symbol
        contractAddress
        rawBalance
        formattedAmount
        ethEquivalent
      }
    }
    pendingReceiptsEthEquivalent
    externalLinks {
      label
      url
    }
  }
}

query ListCampaigns($status: DefiUnited_CampaignStatus) {
  DefiUnited_campaigns(status: $status) {
    slug
    name
    summary
    status
    targetAmount
    totalPledged
    totalReceived
    percentReceived
    lastUpdateAt
  }
}
